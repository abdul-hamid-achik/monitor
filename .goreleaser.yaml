version: 2

project_name: monitor

before:
  hooks:
    - go mod tidy

builds:
  - id: monitor
    main: ./cmd/monitor
    binary: monitor
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: abdul-hamid-achik
    name: monitor
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

brews:
  - name: monitor
    homepage: https://github.com/abdul-hamid-achik/monitor
    description: "Terminal-based system monitor for macOS (Apple Silicon) built with Go"
    license: MIT
    directory: Formula
    repository:
      owner: abdul-hamid-achik
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    install: |
      bin.install "monitor"
    test: |
      system "#{bin}/monitor", "--version"
    skip_upload: "{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}"
